<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MayzaaDash - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="/public/css/style.css">
</head>
<body>

    <canvas id="particle-canvas" class="particle-canvas"></canvas>

    <div class="flex h-screen overflow-hidden">
        <div id="sidebar-container"></div>

        <main class="main-content">
            <div class="max-w-6xl mx-auto">

                <!-- Header -->
                <div class="flex items-center justify-between mb-8">
                    <div>
                        <h1 class="text-2xl font-extrabold text-white tracking-tight">
                            Dashboard <span class="text-gray-400 font-light">Overview</span>
                        </h1>
                        <p class="text-xs text-gray-600 mt-1">Status real-time & performa API</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-white/5 border border-white/10">
                            <div class="status-dot"></div>
                            <span class="text-xs text-gray-400 font-medium">Operational</span>
                        </div>
                    </div>
                </div>

                <!-- Stats Row -->
                <div class="stats-row mb-6">
                    <div class="stat-item">
                        <div class="stat-icon">
                            <img src="https://cdn-icons-png.flaticon.com/512/2920/2920277.png" alt="requests" class="icon-img">
                        </div>
                        <div class="stat-info">
                            <span class="stat-number mono" id="total-requests">0</span>
                            <span class="stat-desc">Total Requests</span>
                        </div>
                        <div class="stat-trend up" id="trend-requests">↑ 0</div>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat-item">
                        <div class="stat-icon">
                            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135706.png" alt="credits" class="icon-img">
                        </div>
                        <div class="stat-info">
                            <span class="stat-number mono" id="credits-used">0</span>
                            <span class="stat-desc">Credits Used</span>
                        </div>
                        <div class="stat-trend up" id="trend-credits">↑ 0</div>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat-item">
                        <div class="stat-icon">
                            <img src="https://cdn-icons-png.flaticon.com/512/1828/1828884.png" alt="uptime" class="icon-img">
                        </div>
                        <div class="stat-info">
                            <span class="stat-number mono" id="uptime-display">00:00:00</span>
                            <span class="stat-desc">Uptime</span>
                        </div>
                        <div class="stat-trend up">Live</div>
                    </div>
                </div>

                <!-- Credit Progress -->
                <div class="credit-section mb-6">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-xs text-gray-500 uppercase tracking-wider">Credit Usage</span>
                        <span class="text-xs text-gray-400 mono" id="credit-label">0 / 12,500</span>
                    </div>
                    <div class="credit-track">
                        <div class="credit-fill" id="credit-bar" style="width: 0%;"></div>
                    </div>
                </div>

                <!-- Chart + Health -->
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
                    <div class="lg:col-span-2 chart-card">
                        <div class="flex items-center justify-between mb-4">
                            <div class="flex items-center gap-2">
                                <h3 class="text-white font-semibold text-sm">Traffic Real-Time</h3>
                                <span class="live-badge">LIVE</span>
                            </div>
                        </div>
                        <div class="chart-wrapper">
                            <canvas id="trafficChart"></canvas>
                        </div>
                    </div>

                    <div class="side-panel">
                        <h3 class="text-white font-semibold text-sm mb-4">System Health</h3>
                        <div class="health-grid">
                            <div class="health-item">
                                <span class="health-label">CPU</span>
                                <div class="health-bar"><div class="health-fill" style="width: 0%"></div></div>
                                <span class="health-value">0%</span>
                            </div>
                            <div class="health-item">
                                <span class="health-label">RAM</span>
                                <div class="health-bar"><div class="health-fill" style="width: 0%"></div></div>
                                <span class="health-value">0%</span>
                            </div>
                            <div class="health-item">
                                <span class="health-label">Disk</span>
                                <div class="health-bar"><div class="health-fill" style="width: 0%"></div></div>
                                <span class="health-value">0%</span>
                            </div>
                            <div class="health-item">
                                <span class="health-label">Network</span>
                                <div class="health-bar"><div class="health-fill" style="width: 0%"></div></div>
                                <span class="health-value">0%</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Recent Activity -->
                <div class="info-card">
                    <h3 class="text-white font-semibold text-sm mb-3">Recent Activity</h3>
                    <div class="activity-list" id="activity-list">
                        <div class="activity-item">
                            <div class="activity-dot"></div>
                            <div class="activity-info">
                                <span class="activity-text">Waiting for data...</span>
                                <span class="activity-time">--</span>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="/public/js/sidebar.js"></script>
    <script src="/public/js/dashboard.js"></script>
</body>
</html>
