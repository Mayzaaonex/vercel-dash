<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek AI - MayzaaDash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050505;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            width: 100%;
            background: rgba(15,15,15,0.95);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 30px;
        }
        h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
        .subtitle { font-size: 12px; color: #64748b; margin-bottom: 20px; }
        textarea {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 14px;
            color: #fff;
            font-size: 14px;
            resize: vertical;
            min-height: 100px;
            outline: none;
            font-family: 'Inter', sans-serif;
        }
        textarea:focus { border-color: #6366f1; }
        select {
            background: #0a0a0a;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 10px 14px;
            color: #fff;
            font-size: 13px;
            outline: none;
            cursor: pointer;
            width: 100%;
        }
        select:focus { border-color: #6366f1; }
        .btn {
            width: 100%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .result-box {
            margin-top: 16px;
            background: #0a0a0a;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 16px;
            min-height: 60px;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 400px;
            overflow-y: auto;
        }
        .result-box .reasoning {
            color: #22d3ee;
            font-style: italic;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .api-url {
            margin-top: 12px;
            font-size: 11px;
            color: #4ade80;
            font-family: 'Courier New', monospace;
            word-break: break-all;
            background: #0a0a0a;
            padding: 10px;
            border-radius: 8px;
        }
        .btn-copy {
            font-size: 11px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            color: #aaa;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
        }
        .btn-copy:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .flex-row { display: flex; gap: 10px; }
        .flex-1 { flex: 1; }
        .info-text { font-size: 11px; color: #555; margin-top: 4px; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 99px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🧠 DeepSeek AI</h1>
        <p class="subtitle">Akses DeepSeek gratis tanpa API key — V4 Flash & R1</p>

        <textarea id="prompt" placeholder="Ketik pertanyaanmu di sini..."></textarea>

        <div class="flex-row" style="margin-top: 12px;">
            <div class="flex-1">
                <select id="model">
                    <option value="v4-flash">⚡ DeepSeek V4 Flash (Cepat)</option>
                    <option value="r1">🧠 DeepSeek R1 (Reasoning)</option>
                </select>
            </div>
            <button class="btn" onclick="test()" id="btnTest" style="margin-top:0; width:auto; padding: 10px 24px;">
                🚀 Kirim
            </button>
        </div>

        <div class="result-box" id="result">
            <span style="color:#555;">Hasil akan muncul di sini...</span>
        </div>

        <div class="api-url" id="apiUrl" style="display:none;"></div>
        <button class="btn-copy" id="btnCopy" style="display:none;" onclick="copyUrl()">📋 Copy API URL</button>

        <p class="info-text" style="margin-top: 16px; text-align: center;">
            Powered by <a href="https://deep-seek.ai" target="_blank" style="color:#6366f1;">deep-seek.ai</a> · Model: V4 Flash & R1
        </p>
    </div>

    <script>
        let currentUrl = '';

        async function test() {
            const prompt = document.getElementById('prompt').value.trim();
            const model = document.getElementById('model').value;
            const btn = document.getElementById('btnTest');
            const resultBox = document.getElementById('result');

            if (!prompt) return alert('Masukkan pertanyaan dulu!');

            btn.disabled = true;
            btn.textContent = '⏳ Loading...';
            resultBox.innerHTML = '<span style="color:#555;">Menunggu respon...</span>';

            currentUrl = `/ai/deepseek?text=${encodeURIComponent(prompt)}&model=${model}`;

            try {
                const res = await fetch(currentUrl);
                const data = await res.json();

                if (data.success) {
                    let html = '';
                    if (data.reasoning) {
                        html += `<div class="reasoning">💭 ${data.reasoning}</div>`;
                    }
                    html += data.content || 'Tidak ada respon.';
                    resultBox.innerHTML = html;
                    
                    document.getElementById('apiUrl').style.display = 'block';
                    document.getElementById('apiUrl').textContent = window.location.origin + currentUrl;
                    document.getElementById('btnCopy').style.display = 'inline-block';
                } else {
                    resultBox.innerHTML = `<span style="color:#ef4444;">❌ Error: ${data.error || 'Gagal fetch'}</span>`;
                }
            } catch (e) {
                resultBox.innerHTML = `<span style="color:#ef4444;">❌ Error: ${e.message}</span>`;
            }

            btn.disabled = false;
            btn.textContent = '🚀 Kirim';
        }

        function copyUrl() {
            const fullUrl = window.location.origin + currentUrl;
            navigator.clipboard.writeText(fullUrl).then(() => {
                const btn = document.getElementById('btnCopy');
                btn.textContent = '✅ Copied!';
                setTimeout(() => btn.textContent = '📋 Copy API URL', 2000);
            });
        }
    </script>

</body>
</html>
